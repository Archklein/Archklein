name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: github-metrics.svg
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          config_timezone: Asia/Manila
          
          # Matrix/Terminal theme configuration
          config_padding: 0, 8 + 11%
          style: |
            div.header { color: #00FF33; }
            h2, h3, h4 { color: #00FF33 !important; }
            .gray, .text-muted { color: #00AA22 !important; }
            svg { background: #0d1117; border: 1px solid #00FF33; border-radius: 6px; }
